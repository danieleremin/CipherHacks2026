; firmware/esp32-sensor/platformio.ini
; Wardriving sensor node — ESP32-S3
; See SPEC_ESP32_SENSOR_NODE.md Section 5.6

[env:esp32s3]
platform  = espressif32
board     = esp32-s3-devkitc-1
framework = arduino

; Library dependencies — pinned to versions used during development
lib_deps =
    mikalhart/TinyGPSPlus @ ^1.0.3
    adafruit/Adafruit BNO08x @ ^1.2.3
    adafruit/Adafruit VL53L1X @ ^3.1.0
    adafruit/Adafruit BusIO @ ^1.16.1

; ── Build flags ──────────────────────────────────────────────────────────────
; NODE_ID: Change to 0x02, 0x03, etc. for each additional sensor node.
;          This is the only value that differs between nodes.
;
; To build node 2: pio run -e esp32s3 --target upload with NODE_ID=2
; Or create a separate [env:esp32s3_node2] section below.

build_flags =
    -DNODE_ID=1
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    ; Uncomment to enable serial-only debug mode (no ESP-NOW TX):
    ; -DDEBUG_SERIAL_ONLY
    ; Uncomment to select TF-Luna instead of VL53L1X:
    ; -DRANGEFINDER_TF_LUNA
    ; -URANGEFINDER_VL53L1X

; Shared header path — gives src/ access to ../../shared/packet_schema.h
build_src_filter = +<*> +<../../shared/>

monitor_speed = 115200
upload_speed  = 921600

; ── Additional nodes (uncomment and adjust NODE_ID as needed) ────────────────

; [env:esp32s3_node2]
; extends = env:esp32s3
; build_flags =
;     ${env:esp32s3.build_flags}
;     -UNODE_ID
;     -DNODE_ID=2

