; firmware/esp32-sensor/platformio.ini
; Wardriving sensor node — ESP32 DEVKIT V1

[env:esp32devkit]
platform  = espressif32
board     = esp32doit-devkit-v1
framework = arduino

lib_deps =
    adafruit/Adafruit BNO08x @ ^1.2.3
    adafruit/Adafruit VL53L1X @ ^3.1.0
    adafruit/Adafruit BusIO @ ^1.16.1

build_flags =
    -DNODE_ID=1
    ; Uncomment to enable serial-only debug mode (no ESP-NOW TX):
    ; -DDEBUG_SERIAL_ONLY
    ; Uncomment to select TF-Luna instead of VL53L1X:
    ; -DRANGEFINDER_TF_LUNA
    ; -URANGEFINDER_VL53L1X

monitor_speed = 115200
upload_speed  = 921600

