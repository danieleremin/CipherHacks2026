; firmware/esp32-sensor/platformio.ini
; Wardriving sensor node — ESP32 DEVKIT V1
;
; FLASHING GUIDE:
;   Node 1 (scanner): pio run -e node1 --target upload
;   Node 2 (scanner): pio run -e node2 --target upload
;   Node 3 (anchor):  pio run -e node3_anchor --target upload
;
; Flash one node at a time. Swap the USB cable between each.

; ── Shared base configuration ─────────────────────────────────────────────────
[env:base]
platform  = espressif32
board     = esp32doit-devkit-v1
framework = arduino

lib_deps =
    adafruit/Adafruit BNO08x @ ^1.2.3
    adafruit/Adafruit VL53L1X @ ^3.1.0
    adafruit/Adafruit BusIO @ ^1.16.1

build_flags =
    -DCORE_DEBUG_LEVEL=0
    ; Uncomment for serial-only debug (no ESP-NOW TX):
    ; -DDEBUG_SERIAL_ONLY
    ; Uncomment to use TF-Luna instead of VL53L1X:
    ; -DRANGEFINDER_TF_LUNA
    ; -URANGEFINDER_VL53L1X

monitor_speed = 115200
upload_speed  = 921600

; ── Node 1: scanner ───────────────────────────────────────────────────────────
[env:node1]
extends   = env:base
build_flags =
    ${env:base.build_flags}
    -DNODE_ID=1

; ── Node 2: scanner ───────────────────────────────────────────────────────────
[env:node2]
extends   = env:base
build_flags =
    ${env:base.build_flags}
    -DNODE_ID=2

; ── Node 3: anchor (reference transmitter) ────────────────────────────────────
; This node broadcasts a beacon on a fixed channel so the two scanner nodes
; can use it as a known reference point for differential RSSI positioning.
[env:node3_anchor]
extends   = env:base
build_flags =
    ${env:base.build_flags}
    -DNODE_ID=3
    -DANCHOR_MODE
    -DANCHOR_CHANNEL=6
    -DANCHOR_SSID=\"WARDRIVE_ANCHOR\"
    -DANCHOR_TX_POWER=20