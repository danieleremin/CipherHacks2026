; firmware/espnow-bridge — companion ESP32 that bridges ESP-NOW <-> UART
; for the Arduino R4 WiFi base node (R4 has no native ESP-NOW support).

[env:esp32devkit]
platform  = espressif32
board     = esp32doit-devkit-v1
framework = arduino

build_flags =
    -DBRIDGE_UART_BAUD=115200

monitor_speed = 115200
upload_speed  = 921600
