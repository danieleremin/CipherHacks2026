; firmware/lcd-driver — Arduino Mega 2560 driving the 2.8" TFT LCD shield
; (MCUFRIEND_kbv has a working AVR/Mega branch; the R4's RA4M1 has none).
; Receives detection records + mirrored mode commands from the ESP-NOW
; bridge over Serial1, and owns OUI lookup, dedup, SD logging, and the LCD.

[env:megaatmega2560]
platform  = atmelavr
board     = megaatmega2560
framework = arduino

lib_deps =
    adafruit/Adafruit GFX Library @ ^1.11.5
    prenticedavid/MCUFRIEND_kbv @ ^3.1.0-Beta
    arduino-libraries/SD @ ^1.3.0

monitor_speed = 115200
upload_speed  = 115200
